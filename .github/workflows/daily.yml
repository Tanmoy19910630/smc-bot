name: SMC Daily Bot
on:
  schedule:
    # Triggers at 3:43 PM IST (Asia/Kolkata) Monday-Friday
    - cron: '43 15 * * 1-5'
      timezone: 'Asia/Kolkata'
  workflow_dispatch:
jobs:
  run:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install Dependencies
        run: pip install yfinance pandas numpy ta python-telegram-bot nest_asyncio pytz
      
      - name: Run Bot Execution
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python main.py

      - name: Save and Commit State Ledger
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          if [ -f state.json ]; then
            git add state.json
            if ! git diff --cached --quiet; then
              git commit -m "Automated state tracking update [Skip CI]"
              git push origin HEAD:${{ github.ref_name }}
              echo "✅ state.json successfully saved to repository!"
            else
              echo "ℹ️ No changes detected in state.json."
            fi
          else
            echo "⚠️ state.json was not found."
          fi
          
