name: SMC Daily Bot
on:
  schedule:
    - cron: '43 15 * * 1-5'
      timezone: 'Asia/Kolkata'
  workflow_dispatch:
jobs:
  run:
    runs-on: ubuntu-latest
    # Gives the runner permission to push state updates back to your repository
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install
        run: pip install yfinance pandas numpy ta python-telegram-bot nest_asyncio pytz
      
      - name: Run Bot
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python main.py

      # NEW STEP: Commit and save state.json back to Git
      - name: Save and Commit State
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          # Only proceed if state.json was created or altered
          if [ -f state.json ]; then
            git add state.json
            if ! git diff --cached --quiet; then
              git commit -m "Automated state tracking update [Skip CI]"
              git push origin HEAD:${{ github.ref_name }}
              echo "✅ state.json saved securely to repository!"
            else
              echo "ℹ️ No changes detected in state.json."
            fi
          else
            echo "⚠️ state.json was not generated by the execution script."
          fi

